name: Build Decktation Plugin

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [master, main]
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: node scripts/release-version.mjs check
      - run: pip install pytest
      - run: pytest tests/ -v
      - run: python -m py_compile main.py wow_voice_chat.py controller_listener.py deck_hid.py

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          node scripts/release-version.mjs check "$RELEASE_TAG"

      - name: Download Decky CLI
        run: |
          curl -fL -o /tmp/decky-cli \
            https://github.com/SteamDeckHomebrew/cli/releases/download/0.0.7/decky-linux-x86_64
          chmod +x /tmp/decky-cli

      - name: Build marketplace artifact
        run: sudo /tmp/decky-cli plugin build -b -t /tmp/decktation-decky-build -o build-output -s directory .

      - name: Validate artifact
        run: |
          unzip -t build-output/decktation.zip
          unzip -l build-output/decktation.zip | grep -q 'decktation/bin/ydotoold'
          unzip -l build-output/decktation.zip | grep -q 'decktation/bin/python/faster_whisper'
          unzip -l build-output/decktation.zip | grep -q 'decktation/bin/lib/libportaudio.so.2'
          unzip -l build-output/decktation.zip | grep -q 'decktation/game_presets.json'
          unzip -l build-output/decktation.zip | grep -q 'decktation/channel_languages.json'
          unzip -l build-output/decktation.zip | grep -q 'cpython-311'
          ! unzip -l build-output/decktation.zip | grep -q 'cpython-313'
          ! unzip -l build-output/decktation.zip | grep -q 'decktation/bin/python/av/'

      - uses: actions/upload-artifact@v4
        with:
          name: decktation
          path: build-output/decktation.zip

      - name: Upload release archive
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/decktation.zip
          draft: false
          prerelease: false
          generate_release_notes: true
